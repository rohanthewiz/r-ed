#
# Release pipeline for r-ed. Triggers on every push to main:
#
#   1. Determines the next version. If the pushed commit hand-edited
#      internal/version/version.go (you bumped major/minor manually), the
#      workflow uses that version as-is. Otherwise it auto-bumps the patch
#      number, commits the change back to main with [skip ci], and pushes.
#   2. Tags v<x.y.z> and pushes the tag.
#   3. Runs goreleaser to cross-compile binaries (linux/darwin/windows ×
#      amd64/arm64), package them, attach them to a GitHub Release, and
#      push an updated Homebrew formula into Formula/ in this same repo
#      (using the default GITHUB_TOKEN — no separate tap repo or PAT
#      required).

name: Release

# PAUSED during the spiceedit → r-ed rebrand: the push trigger is
# disabled so ordinary pushes to main don't cut releases against the
# renamed module/binary until the new repo identity is verified
# end-to-end. Re-enable by restoring:
#
#   push:
#     branches: [main]
#
# under `on:` below. Until then, releases run only via manual
# workflow_dispatch — which also remains the escape hatch if a merge
# commit accidentally carries a skip-CI marker once the push trigger
# is back.
on:
  workflow_dispatch:

# Pushes back to main need write access to the repo's contents. The
# `actions: write` scope lets the final step kick off the Pages
# workflow via workflow_dispatch — the version-bump commit carries
# [skip ci] so the auto-deploy on internal/version/version.go won't
# fire on its own.
permissions:
  contents: write
  actions: write

# Serialise releases — no two version-bumps racing each other.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the workflow can inspect HEAD~1 for the
          # "did this commit hand-edit version.go?" check, and so
          # goreleaser sees prior tags for changelog generation.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Decide whether to auto-bump or accept a hand-edited version.
      - name: Determine version
        id: version
        run: |
          set -euo pipefail

          CURRENT=$(sed -nE 's/.*const Version = "([0-9]+\.[0-9]+\.[0-9]+)".*/\1/p' internal/version/version.go)
          if [[ -z "$CURRENT" ]]; then
            echo "Could not parse version from internal/version/version.go" >&2
            exit 1
          fi

          # If the pushed commit changed version.go, treat that as a
          # manual major/minor bump and use the value as-is. Otherwise
          # auto-bump the patch.
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -qx 'internal/version/version.go'; then
            echo "Version was manually edited to $CURRENT — using as-is."
            echo "version=$CURRENT"  >> "$GITHUB_OUTPUT"
            echo "bumped=false"      >> "$GITHUB_OUTPUT"
          else
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Auto-bumping $CURRENT → $NEW"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "bumped=true"  >> "$GITHUB_OUTPUT"
          fi

      # Commit the bumped version.go back to main. The [skip ci] marker
      # in the commit message tells GitHub Actions not to re-run this
      # workflow (which would loop forever).
      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          set -euo pipefail
          NEW="${{ steps.version.outputs.version }}"

          sed -i -E "s/(const Version = )\"[0-9]+\.[0-9]+\.[0-9]+\"/\1\"$NEW\"/" internal/version/version.go

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/version/version.go
          git commit -m "Release v$NEW [skip ci]"
          git push origin HEAD:main

      # Always create + push the tag (even when version was hand-edited
      # — that's the whole point of accepting it as-is).
      - name: Tag release
        run: |
          set -euo pipefail
          NEW="${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/v$NEW" >/dev/null; then
            echo "Tag v$NEW already exists, skipping."
            exit 0
          fi
          git tag -a "v$NEW" -m "Release v$NEW"
          git push origin "v$NEW"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          # Same-repo brew formula push uses the default workflow token —
          # no separate tap repo or PAT needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Kick the Pages deploy explicitly. The version bump and brew
      # formula commits both carry [skip ci] (otherwise this workflow
      # would loop on its own pushes), and pages.yml is gated by file
      # paths — so without this step the marketing site is stranded at
      # whatever version it last deployed, one bump behind reality.
      # Uses workflow_dispatch (declared in pages.yml) and runs after
      # the version push so the deploy reads the just-bumped value.
      - name: Trigger Pages redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
