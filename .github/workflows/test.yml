#
# Test pipeline for r-ed. Runs `go test ./...` with the race detector
# on every push and every pull request, on Linux + macOS so we catch
# platform-specific flakes before they ship. The release workflow
# (release.yml) doesn't depend on this — it triggers separately on push
# to main — but a red test job is meant to block merges via the PR's
# required-checks setting (configure that on GitHub once the first run
# is green).

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands. Saves CI
# minutes when someone pushes a quick fix on top of an in-progress run.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod / go.sum are not tidy. Run 'make tidy' and commit." >&2
            git --no-pager diff go.mod go.sum
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      # Print a coverage summary into the run log so reviewers can see
      # the trend at a glance without downloading the artifact.
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 30

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14
